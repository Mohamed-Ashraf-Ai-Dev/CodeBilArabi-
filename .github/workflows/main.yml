name: CodeBilArabi Engine 

on:
  schedule:
    # النشر مرتين يومياً بتوقيت مصر (4 عصراً و 9 مساءً)
    - cron: '0 13,18 * * *' 
  workflow_dispatch: # للتشغيل اليدوي للتجربة

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري عشان يقدر يعمل Push لتعديلات الـ JSON
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تحديث لآخر إصدار
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # استخدام التوكن الافتراضي للـ Auth

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # بيسرع الـ Action في المرات الجاية

      - name: Install Dependencies
        run: pip install requests

      - name: Execute CodeBilArabi Logic
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Save Memory (Update database.json)
        # استخدمنا الـ Stash والـ Rebase عشان نضمن إن الـ Action ميفشلش لو فيه تغير في الـ Repo
        run: |
          git config --global user.name 'Mohamed-Ashraf-Bot'
          git config --global user.email 'bot@codebilarabi.ai'
          
          git add database.json
          
          # التحقق من وجود تغييرات قبل الـ Commit
          if ! git diff --cached --exit-code; then
            git commit -m "Update memory log [skip ci]"
            
            # محاولة الـ Push مع التعامل مع الـ Race Conditions
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes in database.json. Skipping push."
          fi
