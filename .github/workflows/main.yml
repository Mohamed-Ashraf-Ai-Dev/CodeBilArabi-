name: CodeBilArabi Engine 

on:
  schedule:
    # النشر مرتين يومياً بتوقيت مصر (4 عصراً و 9 مساءً)
    - cron: '0 13,18 * * *' 
  workflow_dispatch: # للتشغيل اليدوي للتجربة

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري لتعديل ملف الـ JSON
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # لجلب كل تاريخ الـ git لضمان نجاح الـ rebase

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute CodeBilArabi Logic
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Save Memory (Update database.json)
        run: |
          git config --global user.name 'Mohamed-Ashraf-Bot'
          git config --global user.email 'bot@codebilarabi.ai'
          
          # إضافة ملف الذاكرة فقط
          git add database.json
          
          # عمل Commit لو فيه تغييرات
          if git commit -m "Update memory log [skip ci]"; then
            # سحب التغييرات الجديدة بـ Rebase لتفادي الـ Rejected Error
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit (Database is already up to date)."
          fi
